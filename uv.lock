source = { editable = "." }
dependencies = [
    { name = "numpy" },
    { name = "pyyaml" },
]

[package.dev-dependencies]
dev = [
    { name = "pytest" },
]

[package.metadata]
requires-dist = [
    { name = "numpy", specifier = ">=2.2.0" },
    { name = "pyyaml", specifier = ">=6.0" },
]

[package.metadata.requires-dev]
dev = [{ name = "pytest", specifier = ">=8.0" }]
